<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baseball Logic Mobile</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #0a192f;
            overscroll-behavior: none;
            color: white;
            overflow: hidden;
        }
        .neo-shadow {
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.2);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        button:active {
            transform: scale(0.96);
        }
        .cursor-blink::after {
            content: '_';
            animation: blink 1s infinite;
            color: #00E676;
            margin-left: 2px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .slide-in-right {
            animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .slide-out-right {
            animation: slideOutRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 24 }) => {
            const icons = {
                target: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 18a6 6 0 100-12 6 6 0 000 12zM12 14a2 2 0 100-4 2 2 0 000 4z" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                users: <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />,
                heart: <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 000-7.78z" />,
                activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2" />,
                dumbbell: <path d="M6 7h12M6 17h12M2 9v6a2 2 0 002 2h2a2 2 0 002-2V9a2 2 0 00-2-2H4a2 2 0 00-2 2zM16 9v6a2 2 0 002 2h2a2 2 0 002-2V9a2 2 0 00-2-2h-2a2 2 0 00-2 2z" />,
                smile: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" />,
                chevronLeft: <path d="M15 18l-6-6 6-6" />,
                home: <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2zM9 22V12h6v10" />,
                check: <path d="M22 11.08V12a10 10 0 11-5.93-9.14M22 4L12 14.01l-3-3" />,
                circle: <circle cx="12" cy="12" r="10" />,
                settings: <React.Fragment><path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z" /><circle cx="12" cy="12" r="3" /></React.Fragment>,
                history: <React.Fragment><path d="M3 3v5h5M3.05 13A9 9 0 106 5.3L3 8" /><path d="M12 7v5l3 3" /></React.Fragment>,
                plus: <path d="M12 5v14M5 12h14" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6" />,
                edit: <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z" />,
                chevronRight: <path d="M9 18l6-6-6-6" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [checkedItems, setCheckedItems] = useState({});
            const [activeCategory, setActiveCategory] = useState(null);
            const [isExiting, setIsExiting] = useState(false);
            const [view, setView] = useState('main'); 
            const [advisorIndex, setAdvisorIndex] = useState(0);
            const [typedText, setTypedText] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('bb_categories');
                return saved ? JSON.parse(saved) : [
                    { id: 'batting', name: 'バッティング', icon: 'target', color: 'from-indigo-500 to-indigo-900',
                      items: [
                        { id: 'b1', label: '右肘の内側で押すイメージ', points: 30 },
                        { id: 'b2', label: 'レベルスイング：線で捉える', points: 20 },
                        { id: 'b3', label: '割れの形成：タメの維持', points: 25 },
                        { id: 'b4', label: '得意コースを一球で仕留める', points: 30 },
                        { id: 'b5', label: 'バント：右足重心・引き', points: 50 },
                      ]
                    },
                    { id: 'defense', name: '守備', icon: 'smile', color: 'from-amber-400 to-orange-700',
                      items: [
                        { id: 'd1', label: '足を止めずバウンドを合わせる', points: 20 },
                        { id: 'd2', label: 'ステップを使い下半身で送球', points: 25 },
                        { id: 'd3', label: '飛んできた時のシミュレーション', points: 15 },
                        { id: 'd4', label: '低姿勢：下から覗き込む', points: 20 },
                      ]
                    },
                    { id: 'baserunning', name: '走塁', icon: 'activity', color: 'from-sky-400 to-sky-700',
                      items: [
                        { id: 'r1', label: '全力疾走（移動＝練習）', points: 25 },
                        { id: 'r2', label: '状況判断と次の塁の狙い', points: 30 },
                      ]
                    },
                    { id: 'team', name: 'チーム', icon: 'users', color: 'from-blue-500 to-blue-900',
                      items: [
                        { id: 't1', label: '雰囲気を良くする声出し', points: 30 },
                        { id: 't2', label: '私語厳禁：自分から注意する', points: 40 },
                        { id: 't3', label: '心得を周囲に教える', points: 30 },
                      ]
                    },
                    { id: 'mindset', name: '心構え', icon: 'heart', color: 'from-pink-500 to-pink-900',
                      items: [
                        { id: 'm1', label: '毎朝の「心得」確認', points: 15 },
                        { id: 'm2', label: '常に全力・気を抜かない', points: 20 },
                        { id: 'm3', label: '応援される選手への意識', points: 25 },
                      ]
                    },
                    { id: 'bodybuilding', name: '体づくり', icon: 'dumbbell', color: 'from-emerald-500 to-emerald-900',
                      items: [
                        { id: 'p1', label: '股関節と肩甲骨の柔軟性', points: 30 },
                        { id: 'p2', label: '練習後30分以内のプロテイン', points: 25 },
                        { id: 'p3', label: '8時間以上の質の高い睡眠', points: 20 },
                        { id: 'p4', label: '体幹：軸がぶれない強さ', points: 40 },
                      ]
                    }
                ];
            });

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('bb_history');
                return saved ? JSON.parse(saved) : [];
            });

            // BP Calculation logic
            const currentSessionBp = useMemo(() => {
                return categories.reduce((catSum, cat) => {
                    return catSum + cat.items.reduce((itemSum, item) => {
                        return itemSum + (checkedItems[item.id] ? item.points : 0);
                    }, 0);
                }, 0);
            }, [checkedItems, categories]);

            const totalLifetimeBp = useMemo(() => {
                const savedBp = history.reduce((sum, entry) => sum + (entry.bp || 0), 0);
                return savedBp + currentSessionBp;
            }, [history, currentSessionBp]);

            const level = Math.floor(totalLifetimeBp / 500) + 1;
            const progress = (totalLifetimeBp % 500) / 5;

            // Safe find logic for active category
            const currentCategory = useMemo(() => {
                return categories.find(c => c.id === activeCategory);
            }, [categories, activeCategory]);

            const advisorMessages = [
                "スイングは点ではなく『線』で捉えるレベルスイング。右肘で押し込め！",
                "グリップと足の距離を保つ『割れ』を作ろう。強いタメが打球を変える！",
                "得意コースを明確に。甘い球を逃さない集中力が選球眼の正体ですよ。",
                "変化球は軸足に体重を残し、懐まで呼び込んで逆方向へ打ち返そう！",
                "バントは右足重心でバットは目の前. 当たる瞬間に体を引くのがコツ！",
                "守備は足を止めない。自分から最適なバウンドを作りに行く姿勢が大切！",
                "捕球から送球へのステップを素早く。下半身の力をボールに伝えよう。",
                "投球ごとに『飛んできた時のシミュレーション』を常に。準備が全てです！",
                "低い姿勢でボールを下から覗き込む。基本の体勢が確実な守備を生む！",
                "私語をしている仲間には自分から注意。規律を守り『心を一つに』！",
                "股関節と肩甲骨の可動域は、怪我防止とパフォーマンスに直結します。",
                "練習後30分以内のタンパク質摂取を徹底！身体は食事で作られる！",
                "7〜9時間の質の高い睡眠を確保。成長ホルモンが君を強くする！"
            ];

            useEffect(() => {
                localStorage.setItem('bb_categories', JSON.stringify(categories));
            }, [categories]);

            useEffect(() => {
                localStorage.setItem('bb_history', JSON.stringify(history));
            }, [history]);

            const toggleItem = (itemId) => {
                setCheckedItems(prev => ({
                    ...prev,
                    [itemId]: !prev[itemId]
                }));
            };

            const handleClose = () => {
                setIsExiting(true);
                setTimeout(() => {
                    setActiveCategory(null);
                    setIsExiting(false);
                }, 350);
            };

            const completeTraining = () => {
                if (currentSessionBp === 0) return;
                const clearedItems = [];
                categories.forEach(cat => {
                    cat.items.forEach(item => {
                        if (checkedItems[item.id]) {
                            clearedItems.push({ 
                                label: item.label, 
                                category: cat.name,
                                color: cat.color 
                            });
                        }
                    });
                });

                const entry = {
                    date: new Date().toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
                    bp: currentSessionBp,
                    details: clearedItems
                };
                setHistory([entry, ...history]);
                setCheckedItems({});
                setView('history');
                setActiveCategory(null);
            };

            useEffect(() => {
                setTypedText("");
                setIsTyping(true);
                let i = 0;
                const fullText = advisorMessages[advisorIndex];
                const timer = setInterval(() => {
                    setTypedText(fullText.substring(0, i + 1));
                    i++;
                    if (i >= fullText.length) {
                        clearInterval(timer);
                        setIsTyping(false);
                    }
                }, 100);
                return () => clearInterval(timer);
            }, [advisorIndex]);

            useEffect(() => {
                const cycle = setInterval(() => setAdvisorIndex(c => (c + 1) % advisorMessages.length), 10000);
                return () => clearInterval(cycle);
            }, []);

            const addItem = (catId) => {
                const label = prompt("新しい項目名を入力してください");
                if (!label) return;
                const points = parseInt(prompt("獲得BPを入力してください", "20"));
                if (isNaN(points)) return;
                setCategories(categories.map(c => {
                    if (c.id === catId) {
                        return { ...c, items: [...c.items, { id: 'custom_' + Date.now(), label, points }] };
                    }
                    return c;
                }));
            };

            const editItem = (catId, itemId) => {
                const category = categories.find(c => c.id === catId);
                const item = category.items.find(i => i.id === itemId);
                const newLabel = prompt("項目名を修正してください", item.label);
                if (!newLabel) return;
                const newPoints = parseInt(prompt("BPを修正してください", item.points));
                if (isNaN(newPoints)) return;
                setCategories(categories.map(c => {
                    if (c.id === catId) {
                        return { 
                            ...c, 
                            items: c.items.map(i => i.id === itemId ? { ...i, label: newLabel, points: newPoints } : i) 
                        };
                    }
                    return c;
                }));
            };

            const deleteItem = (catId, itemId) => {
                if (!confirm("この項目を削除しますか？")) return;
                setCategories(categories.map(c => {
                    if (c.id === catId) {
                        return { ...c, items: c.items.filter(i => i.id !== itemId) };
                    }
                    return c;
                }));
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto overflow-hidden relative shadow-2xl bg-[#0a192f]">
                    
                    {/* Header */}
                    <div className={`px-6 pt-6 pb-2 shrink-0 bg-gradient-to-b from-[#0a192f] to-transparent z-10 transition-all duration-500 ${activeCategory ? 'opacity-20 blur-[2px]' : 'opacity-100'}`}>
                        <div className="flex justify-between items-start">
                            <div>
                                <div className="text-[10px] text-[#00E676] font-bold tracking-[0.2em] opacity-80 uppercase leading-none">Baseball Logic v3.1</div>
                                <div className="flex items-baseline gap-1 mt-1">
                                    <span className="text-5xl font-black italic tracking-tighter text-white leading-none">{currentSessionBp}</span>
                                    <span className="text-lg font-bold opacity-60 italic text-white">BP</span>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setView('history')} className={`p-2 rounded-2xl bg-white/5 ${view === 'history' ? 'text-[#00E676] bg-white/10' : 'text-white/40 shadow-inner'}`}>
                                    <Icon name="history" size={18} />
                                </button>
                                <button onClick={() => setView('manage')} className={`p-2 rounded-2xl bg-white/5 ${view === 'manage' ? 'text-[#00E676] bg-white/10' : 'text-white/40 shadow-inner'}`}>
                                    <Icon name="settings" size={18} />
                                </button>
                                <button onClick={() => {setView('main'); setActiveCategory(null);}} className={`p-2 rounded-2xl bg-white/5 ${view === 'main' && !activeCategory ? 'text-[#00E676] bg-white/10' : 'text-white/40 shadow-inner'}`}>
                                    <Icon name="home" size={18} />
                                </button>
                            </div>
                        </div>

                        <div className="space-y-1.5 mt-3">
                            <div className="flex justify-between items-end text-[9px] font-bold uppercase tracking-wider">
                                <div className="text-[#00E676]">LV.{level} Strategic Mind</div>
                                <div className="text-white/40 uppercase">Total: {totalLifetimeBp} BP</div>
                            </div>
                            <div className="w-full h-2.5 bg-white/5 rounded-full overflow-hidden border border-white/10">
                                <div className="h-full bg-[#00E676] transition-all duration-700 ease-out neo-shadow" style={{ width: `${progress}%` }} />
                            </div>
                        </div>
                    </div>

                    {/* Advisor */}
                    <div className={`px-4 mb-3 shrink-0 z-10 transition-all duration-500 ${activeCategory || view !== 'main' ? 'opacity-0 h-0 overflow-hidden mb-0' : 'opacity-100 h-auto'}`}>
                        <div className="bg-[#00E6760a] backdrop-blur-md border border-[#00E67633] rounded-3xl p-4 flex flex-col gap-0.5 min-h-[75px] justify-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-1 h-full bg-[#00E67633]"></div>
                            <div className="text-[9px] font-bold text-[#00E676] opacity-60 uppercase tracking-widest flex items-center gap-1.5 mb-0.5">
                                <Icon name="shield" size={10} />
                                Coach Insight
                            </div>
                            <div className={`text-sm font-bold text-white leading-relaxed ${isTyping ? 'cursor-blink' : ''}`}>
                                {typedText}
                            </div>
                        </div>
                    </div>

                    {/* Main Container */}
                    <div className="flex-1 relative overflow-hidden px-4">
                        
                        {/* 1. Main Grid */}
                        <div className={`category-grid absolute inset-x-4 transition-all duration-500 ${activeCategory ? 'opacity-40 blur-[4px] scale-95 pointer-events-none' : (view !== 'main' ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100 scale-100')}`}>
                            {categories.map((cat) => (
                                <button 
                                    key={cat.id} 
                                    onClick={() => setActiveCategory(cat.id)} 
                                    className={`relative flex flex-col items-start p-4 rounded-[2rem] h-32 border-b-4 border-black/40 bg-gradient-to-br ${cat.color} text-white shadow-lg`}
                                >
                                    <div className="p-2 bg-white/10 rounded-xl mb-auto"><Icon name={cat.icon} size={20} /></div>
                                    <div className="text-left w-full mt-1.5">
                                        <div className="text-base font-black italic leading-none tracking-tight uppercase">{cat.name}</div>
                                        <div className="flex justify-between items-center mt-2.5">
                                            <div className="text-[8px] opacity-70 font-bold uppercase tracking-widest bg-black/20 px-1.5 py-0.5 rounded-md">
                                                {cat.items.filter(i => checkedItems[i.id]).length}/{cat.items.length}
                                            </div>
                                            <Icon name="chevronRight" size={12} />
                                        </div>
                                    </div>
                                </button>
                            ))}
                        </div>

                        {/* 2. Detail View */}
                        {activeCategory && currentCategory && (
                            <div className={`absolute inset-0 z-20 px-4 ${isExiting ? 'slide-out-right' : 'slide-in-right'} bg-[#0a192f44] backdrop-blur-md flex flex-col pt-4 pb-6`}>
                                <div className="flex items-center justify-between mb-4">
                                    <button onClick={handleClose} className="flex items-center gap-2 text-white/70 text-xs font-bold bg-white/10 px-4 py-2 rounded-full border border-white/20 active:bg-white/30 transition-all">
                                        <Icon name="chevronLeft" size={14} /> Back
                                    </button>
                                    <div className="text-xl font-black italic text-[#00E676] uppercase tracking-tighter text-right flex-1">
                                        {currentCategory.name}
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto hide-scrollbar space-y-2.5 pr-1">
                                    {currentCategory.items.map(item => (
                                        <button 
                                            key={item.id} 
                                            onClick={() => toggleItem(item.id)} 
                                            className={`w-full flex items-center gap-3.5 p-4 rounded-[1.5rem] border transition-all duration-300 ${
                                                checkedItems[item.id] 
                                                ? `bg-gradient-to-r ${currentCategory.color} border-white/40 shadow-lg scale-[0.98] opacity-100` 
                                                : `bg-[#162a4a] border-white/10 opacity-100 shadow-md`
                                            }`}
                                        >
                                            <div className={checkedItems[item.id] ? 'text-white' : 'text-white/30'}>
                                                <Icon name={checkedItems[item.id] ? "check" : "circle"} size={22} />
                                            </div>
                                            <div className="flex-1 text-left text-white leading-snug">
                                                <div className={`text-sm font-bold ${checkedItems[item.id] ? 'opacity-100' : 'opacity-90'}`}>
                                                    {item.label}
                                                </div>
                                            </div>
                                            <div className={`text-base font-black italic ${checkedItems[item.id] ? 'text-white' : 'text-[#00E676] opacity-40'}`}>
                                                +{item.points}
                                            </div>
                                        </button>
                                    ))}
                                </div>

                                <button onClick={completeTraining} className="w-full mt-4 py-4.5 bg-[#00E676] text-[#0a192f] rounded-[2rem] font-black italic uppercase text-base shadow-[0_0_20px_#00E67666] active:scale-95 transition-transform shrink-0 tracking-widest">
                                    {activeCategory === 'team' ? '心を一つに' : 'DO IT TO WIN!'}
                                </button>
                            </div>
                        )}

                        {/* 3. Manage View */}
                        {view === 'manage' && (
                            <div className="absolute inset-0 z-30 px-4 fade-in bg-[#0a192f] flex flex-col pt-2 pb-24 overflow-y-auto hide-scrollbar">
                                <h2 className="text-xl font-black italic text-[#00E676] mb-4 uppercase tracking-tight">Mission Config</h2>
                                {categories.map(cat => (
                                    <div key={cat.id} className="mb-4 bg-white/5 rounded-[1.5rem] p-4 border border-white/10">
                                        <div className="flex justify-between items-center mb-3">
                                            <div className="flex items-center gap-2 font-black italic text-base uppercase leading-none">
                                                <div className={`w-2.5 h-2.5 rounded-full bg-gradient-to-br ${cat.color} shadow-sm`}></div>
                                                {cat.name}
                                            </div>
                                            <button onClick={() => addItem(cat.id)} className="p-1.5 bg-[#00E67622] text-[#00E676] rounded-lg active:bg-[#00E67644]"><Icon name="plus" size={14} /></button>
                                        </div>
                                        <div className="space-y-2">
                                            {cat.items.map(item => (
                                                <div key={item.id} className="flex items-center justify-between p-3.5 bg-white/5 rounded-xl border border-white/5">
                                                    <div className="flex-1 text-xs font-bold opacity-80 leading-tight">
                                                        {item.label} 
                                                        <div className="text-[9px] text-[#00E676] opacity-60 mt-0.5 font-black">+{item.points} BP</div>
                                                    </div>
                                                    <div className="flex gap-1.5">
                                                        <button onClick={() => editItem(cat.id, item.id)} className="text-white/40 p-1.5 hover:text-[#00E676] transition-colors"><Icon name="edit" size={14} /></button>
                                                        <button onClick={() => deleteItem(cat.id, item.id)} className="text-red-500/40 p-1.5 hover:text-red-500 transition-colors"><Icon name="trash" size={14} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 4. History View */}
                        {view === 'history' && (
                            <div className="absolute inset-0 z-30 px-4 fade-in bg-[#0a192f] flex flex-col pt-2 pb-24 overflow-y-auto hide-scrollbar">
                                <h2 className="text-xl font-black italic text-[#00E676] mb-4 uppercase tracking-tight">Activity Logs</h2>
                                {history.length === 0 ? (
                                    <div className="text-center opacity-30 mt-20 font-bold uppercase tracking-widest text-xs">History Clear</div>
                                ) : (
                                    <div className="space-y-4">
                                        {history.map((entry, idx) => (
                                            <div key={idx} className="bg-white/5 p-5 rounded-[2rem] border border-white/10 shadow-sm">
                                                <div className="flex justify-between items-center mb-3 border-b border-white/5 pb-2">
                                                    <div className="text-[9px] opacity-40 font-bold uppercase tracking-tighter">{entry.date}</div>
                                                    <div className="text-xl font-black italic text-[#00E676]">+{entry.bp}BP</div>
                                                </div>
                                                <div className="space-y-2">
                                                    {entry.details && entry.details.map((detail, dIdx) => (
                                                        <div key={dIdx} className={`flex items-start gap-2.5 p-3 rounded-xl bg-gradient-to-r ${detail.color} border border-white/10 mb-1.5 shadow-md opacity-100`}>
                                                            <div className="mt-1 w-1.5 h-1.5 rounded-full bg-white shrink-0 shadow-[0_0_3px_rgba(255,255,255,0.8)]"></div>
                                                            <div className="text-[10px] font-bold leading-tight">
                                                                <span className="text-white/60 text-[8px] block uppercase tracking-tighter mb-0.5">{detail.category}</span>
                                                                <span className="text-white">{detail.label}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={() => {if(confirm("履歴を全て削除しますか？")) setHistory([]);}} className="w-full py-5 text-red-500/50 text-[9px] font-black uppercase tracking-[0.4em] mt-2">Flush Memory</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Footer Nav */}
                    <div className={`absolute bottom-3 left-0 right-0 px-8 pointer-events-none z-10 transition-opacity duration-500 ${activeCategory ? 'opacity-0' : 'opacity-100'}`}>
                        <div className="flex justify-between items-center text-[8px] font-bold text-white/20 uppercase tracking-[0.4em]">
                            <div className="flex items-center gap-1.5">
                                <span className="w-1 h-1 rounded-full bg-[#00E676] shadow-[0_0_5px_#00E676] animate-pulse"></span>
                                User: NIMOGRAM
                            </div>
                            <div>Strategic OS v3.1</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
